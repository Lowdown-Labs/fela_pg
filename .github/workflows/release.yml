name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write
  actions: read

env:
  REGISTRY_IMAGE: ${{ vars.RELEASE_IMAGE || 'ghcr.io/lowdown-labs/fela_pg' }}
  PGRX_VERSION: "0.19.1"
  PACKAGE_VERSION: "1.0.0"
  FELATAB_MODEL_URL: ${{ vars.FELATAB_MODEL_URL || 'https://d1ruypri5fhwvl.cloudfront.net/felatab/v1/felatab_int8.safetensors' }}
  FELATAB_MODEL_SHA256: ${{ vars.FELATAB_MODEL_SHA256 || '547c451a182f4a61aa4ab811efd1fe2e8c57b75b61e4256b28114934dc539741' }}

jobs:
  build-and-push:
    name: build + smoke + push (PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    outputs:
      version: ${{ steps.ver.outputs.version }}
      digest_16: ${{ steps.expose.outputs.digest_16 }}
      digest_17: ${{ steps.expose.outputs.digest_17 }}
      digest_18: ${{ steps.expose.outputs.digest_18 }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version (git tag, or 'dev' for non-tag runs)
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (arm64 emulation for the cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image (local load, pre-push smoke gate)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          build-args: |
            PG_MAJOR=${{ matrix.pg }}
            FELATAB_MODEL_URL=${{ env.FELATAB_MODEL_URL }}
            FELATAB_MODEL_SHA256=${{ env.FELATAB_MODEL_SHA256 }}
          load: true
          push: false
          tags: pg_fela:smoke-pg${{ matrix.pg }}
          cache-from: type=gha,scope=pg${{ matrix.pg }}
          cache-to: type=gha,mode=max,scope=pg${{ matrix.pg }}

      - name: Smoke test - CREATE EXTENSION + fela_automl on a tiny inline table
        run: |
          set -euo pipefail
          CID=$(docker run -d -e POSTGRES_PASSWORD=postgres pg_fela:smoke-pg${{ matrix.pg }})
          trap 'docker logs "$CID" || true; docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

          echo "waiting for postgres to accept connections..."
          ready=0
          for i in $(seq 1 60); do
            if docker exec "$CID" pg_isready -U postgres >/dev/null 2>&1; then ready=1; break; fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "FAIL: postgres never became ready"
            exit 1
          fi

          OUT=$(docker exec -i "$CID" psql -U postgres -v ON_ERROR_STOP=1 -qAt <<'SQL'
          CREATE EXTENSION IF NOT EXISTS pg_fela;
          DROP TABLE IF EXISTS smoke_tbl;
          CREATE TABLE smoke_tbl (id serial, x1 float8, x2 float8, y text);
          INSERT INTO smoke_tbl (x1, x2, y) VALUES
            (1.0, 1.1, 'a'), (1.1, 0.9, 'a'), (1.2, 1.0, 'a'),
            (9.0, 9.1, 'b'), (9.1, 8.9, 'b'), (9.2, 9.0, 'b'),
            (5.0, 5.0, NULL);
          SELECT prediction FROM fela_automl('smoke_tbl', 'y');
          SQL
          )

          echo "fela_automl prediction (encoded class id): '${OUT}'"
          if [[ "$OUT" != "0" && "$OUT" != "1" ]]; then
            echo "FAIL: expected a zero-config prediction of 0 or 1 (encoded class) from the installed model, got: '$OUT'"
            exit 1
          fi
          echo "SMOKE OK (PG ${{ matrix.pg }}): installed model produced a real prediction with zero config."

      - name: Compute image tags
        id: tags
        run: |
          {
            echo "tags<<TAGEOF"
            echo "${{ env.REGISTRY_IMAGE }}:pg${{ matrix.pg }}"
            echo "${{ env.REGISTRY_IMAGE }}:${{ steps.ver.outputs.version }}-pg${{ matrix.pg }}"
            if [ "${{ matrix.pg }}" = "18" ]; then
              echo "${{ env.REGISTRY_IMAGE }}:latest"
            fi
            echo "TAGEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: |
            PG_MAJOR=${{ matrix.pg }}
            FELATAB_MODEL_URL=${{ env.FELATAB_MODEL_URL }}
            FELATAB_MODEL_SHA256=${{ env.FELATAB_MODEL_SHA256 }}
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=pg${{ matrix.pg }}
          cache-to: type=gha,mode=max,scope=pg${{ matrix.pg }}

      - name: SBOM (syft) for the pushed image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY_IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-pg${{ matrix.pg }}.spdx.json

      - name: Upload SBOM
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: sbom-pg${{ matrix.pg }}
          path: sbom-pg${{ matrix.pg }}.spdx.json
          if-no-files-found: error

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3

      - name: Sign the pushed image (keyless OIDC)
        if: startsWith(github.ref, 'refs/tags/v')
        run: cosign sign --yes "${{ env.REGISTRY_IMAGE }}@${{ steps.build.outputs.digest }}"

      - name: Expose digest for SLSA provenance
        id: expose
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "digest_${{ matrix.pg }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA provenance (PG ${{ matrix.pg }})
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ vars.RELEASE_IMAGE || 'ghcr.io/lowdown-labs/fela_pg' }}
      digest: ${{ matrix.pg == 16 && needs.build-and-push.outputs.digest_16 || (matrix.pg == 17 && needs.build-and-push.outputs.digest_17 || needs.build-and-push.outputs.digest_18) }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  deb-artifacts:
    name: .deb package (PG ${{ matrix.pg }}, amd64)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    steps:
      - uses: actions/checkout@v4

      - name: Add PGDG apt repo
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update

      - name: Install PostgreSQL ${{ matrix.pg }} + build deps
        run: |
          sudo apt-get install -y \
            postgresql-${{ matrix.pg }} postgresql-server-dev-${{ matrix.pg }} \
            libclang-dev clang build-essential

      - name: Rust toolchain
        run: rustup component add rustfmt

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "${PGRX_VERSION}" --locked

      - name: pgrx init against system PG ${{ matrix.pg }}
        run: cargo pgrx init "--pg${{ matrix.pg }}" "/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config"

      - name: cargo pgrx package
        run: cargo pgrx package --pg-config "/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config"

      - name: Build .deb
        run: |
          bash packaging/build-deb.sh "${{ matrix.pg }}" "${PACKAGE_VERSION}" \
            "target/release/pg_fela-pg${{ matrix.pg }}" \
            "pg-fela-pg${{ matrix.pg }}_${PACKAGE_VERSION}_amd64.deb"

      - name: Verify .deb contents
        run: |
          dpkg-deb --info "pg-fela-pg${{ matrix.pg }}_${PACKAGE_VERSION}_amd64.deb"
          dpkg-deb --contents "pg-fela-pg${{ matrix.pg }}_${PACKAGE_VERSION}_amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: pg-fela-pg${{ matrix.pg }}-deb
          path: pg-fela-pg${{ matrix.pg }}_*_amd64.deb
          if-no-files-found: error

  rpm-artifacts:
    name: .rpm package (PG ${{ matrix.pg }}, x86_64)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    steps:
      - name: Add PGDG yum repo + build deps
        run: |
          dnf install -y https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-x86_64/pgdg-redhat-repo-latest.noarch.rpm
          dnf -qy module disable postgresql
          dnf install -y dnf-plugins-core
          dnf config-manager --set-enabled crb
          dnf install -y --allowerasing \
            "postgresql${{ matrix.pg }}-devel" rpm-build clang llvm-devel gcc make \
            curl git openssl-devel pkgconf-pkg-config

      - uses: actions/checkout@v4

      - name: Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "${PGRX_VERSION}" --locked

      - name: pgrx init against PGDG PG ${{ matrix.pg }}
        run: cargo pgrx init "--pg${{ matrix.pg }}" "/usr/pgsql-${{ matrix.pg }}/bin/pg_config"

      - name: cargo pgrx package
        run: cargo pgrx package --pg-config "/usr/pgsql-${{ matrix.pg }}/bin/pg_config"

      - name: Build .rpm
        run: |
          mkdir -p dist
          bash packaging/build-rpm.sh "${{ matrix.pg }}" "${PACKAGE_VERSION}" \
            "target/release/pg_fela-pg${{ matrix.pg }}" dist

      - name: Verify .rpm contents
        run: |
          rpm -qip dist/*.rpm
          rpm -qlp dist/*.rpm

      - uses: actions/upload-artifact@v4
        with:
          name: pg-fela-pg${{ matrix.pg }}-rpm
          path: dist/*.rpm
          if-no-files-found: error

  release-artifacts:
    name: package tarball (PG ${{ matrix.pg }}, amd64)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    steps:
      - uses: actions/checkout@v4

      - name: Add PGDG apt repo
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update

      - name: Install PostgreSQL ${{ matrix.pg }} + build deps
        run: |
          sudo apt-get install -y \
            postgresql-${{ matrix.pg }} postgresql-server-dev-${{ matrix.pg }} \
            libclang-dev clang build-essential

      - name: Rust toolchain
        run: rustup component add rustfmt

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "${PGRX_VERSION}" --locked

      - name: pgrx init against system PG ${{ matrix.pg }}
        run: cargo pgrx init "--pg${{ matrix.pg }}" "/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config"

      - name: cargo pgrx package
        run: cargo pgrx package --pg-config "/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config"

      - name: Tarball the staged extension tree
        run: |
          STAGE="target/release/pg_fela-pg${{ matrix.pg }}"
          test -d "$STAGE" || { echo "FAIL: staged tree $STAGE not found"; exit 1; }
          tar czf "pg_fela-pg${{ matrix.pg }}-amd64.tar.gz" -C "$(dirname "$STAGE")" "$(basename "$STAGE")"

      - uses: actions/upload-artifact@v4
        with:
          name: pg_fela-pg${{ matrix.pg }}-amd64
          path: pg_fela-pg${{ matrix.pg }}-amd64.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [build-and-push, deb-artifacts, rpm-artifacts, release-artifacts]
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release with all package assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.spdx.json
